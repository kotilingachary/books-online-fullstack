# =================================================================
# Books Online - Spring Boot Application Configuration
# Version: 1.0
# =================================================================

# =================================================================
# Application Configuration
# =================================================================
spring.application.name=books-online
server.port=8080

# =================================================================
# H2 Database Configuration
# =================================================================
# Database URL:
# - In-memory: jdbc:h2:mem:booksdb (data lost on restart)
# - File-based: jdbc:h2:file:./data/booksdb (data persisted to file)
spring.datasource.url=jdbc:h2:file:./data/booksdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration (for debugging)
# Access at: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:file:./data/booksdb
# Username: sa
# Password: (leave blank)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =================================================================
# JPA / Hibernate Configuration
# =================================================================
# Database dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# DDL strategy:
# - none: Do nothing
# - validate: Validate schema, make no changes
# - update: Update schema if needed
# - create: Create schema, destroying previous data
# - create-drop: Create schema, drop on shutdown
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (for development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate SQL logging level
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =================================================================
# Database Initialization
# =================================================================
# Run schema.sql on startup
spring.sql.init.mode=always
spring.sql.init.platform=h2

# Data initialization (seed data)
# Set to always to load data.sql on every startup
# Set to never to skip data loading
spring.jpa.defer-datasource-initialization=true

# =================================================================
# Logging Configuration
# =================================================================
# Application logging level
logging.level.com.booksonline=INFO

# Spring framework logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# Log file configuration (optional)
# logging.file.name=logs/books-online.log
# logging.file.max-size=10MB
# logging.file.max-history=30

# =================================================================
# Springdoc OpenAPI / Swagger UI Configuration
# =================================================================
# Swagger UI path: http://localhost:8080/swagger-ui.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Group all endpoints under /api/v1
springdoc.swagger-ui.urls[0].name=Books Online API V1
springdoc.swagger-ui.urls[0].url=/v3/api-docs

# =================================================================
# Jackson JSON Configuration
# =================================================================
# Pretty print JSON responses (for development)
spring.jackson.serialization.indent-output=true

# Date/time format (ISO 8601)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss'Z'
spring.jackson.time-zone=UTC

# Ignore null values in JSON responses
spring.jackson.default-property-inclusion=non_null

# =================================================================
# Server Configuration
# =================================================================
# Enable compression for responses > 2KB
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=2048

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# =================================================================
# JWT Configuration (for V2 - not used in V1)
# =================================================================
# jwt.secret=your-secret-key-change-this-in-production
# jwt.expiration=3600000

# =================================================================
# Development Tools
# =================================================================
# Enable Spring Boot DevTools for hot reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# =================================================================
# Profile-Specific Configuration
# =================================================================
# Active profile: dev, test, prod
# spring.profiles.active=dev

# Load profile-specific properties from:
# - application-dev.properties
# - application-test.properties
# - application-prod.properties
