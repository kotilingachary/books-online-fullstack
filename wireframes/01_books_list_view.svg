<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F5F5F5"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">Books Online</text>

  <!-- Search Bar in Header -->
  <rect x="400" y="25" width="400" height="30" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="415" y="47" font-family="Arial, sans-serif" font-size="14" fill="#999999">Search books...</text>
  <circle cx="775" cy="40" r="10" fill="none" stroke="#999999" stroke-width="2"/>

  <!-- Add Book Button -->
  <rect x="1040" y="25" width="120" height="30" fill="#4CAF50" stroke="none" rx="4"/>
  <text x="1070" y="47" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">+ Add Book</text>

  <!-- Filters Section -->
  <rect x="40" y="120" width="1120" height="50" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" rx="4"/>
  <text x="60" y="150" font-family="Arial, sans-serif" font-size="14" fill="#666666">Filter by:</text>
  <rect x="140" y="135" width="100" height="25" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1" rx="3"/>
  <text x="155" y="152" font-family="Arial, sans-serif" font-size="12" fill="#333333">Genre ▼</text>
  <rect x="260" y="135" width="100" height="25" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1" rx="3"/>
  <text x="275" y="152" font-family="Arial, sans-serif" font-size="12" fill="#333333">Author ▼</text>
  <rect x="380" y="135" width="100" height="25" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1" rx="3"/>
  <text x="395" y="152" font-family="Arial, sans-serif" font-size="12" fill="#333333">Year ▼</text>

  <!-- Books List Header -->
  <rect x="40" y="200" width="1120" height="40" fill="#E8E8E8" stroke="#CCCCCC" stroke-width="1"/>
  <text x="60" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">Cover</text>
  <text x="180" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">Title</text>
  <text x="480" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">Author</text>
  <text x="680" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">Genre</text>
  <text x="880" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">Year</text>
  <text x="1020" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">Actions</text>

  <!-- Book Row 1 -->
  <rect x="40" y="240" width="1120" height="80" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="255" width="50" height="50" fill="#CCCCCC" stroke="#999999" stroke-width="1" rx="2"/>
  <text x="180" y="285" font-family="Arial, sans-serif" font-size="14" fill="#333333">The Great Gatsby</text>
  <text x="180" y="305" font-family="Arial, sans-serif" font-size="12" fill="#999999">ISBN: 978-0-7432-7356-5</text>
  <text x="480" y="293" font-family="Arial, sans-serif" font-size="14" fill="#333333">F. Scott Fitzgerald</text>
  <text x="680" y="293" font-family="Arial, sans-serif" font-size="14" fill="#333333">Fiction</text>
  <text x="880" y="293" font-family="Arial, sans-serif" font-size="14" fill="#333333">1925</text>
  <rect x="1020" y="270" width="60" height="25" fill="#2196F3" stroke="none" rx="3"/>
  <text x="1035" y="287" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Edit</text>
  <rect x="1090" y="270" width="60" height="25" fill="#F44336" stroke="none" rx="3"/>
  <text x="1100" y="287" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Delete</text>

  <!-- Book Row 2 -->
  <rect x="40" y="320" width="1120" height="80" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="335" width="50" height="50" fill="#CCCCCC" stroke="#999999" stroke-width="1" rx="2"/>
  <text x="180" y="365" font-family="Arial, sans-serif" font-size="14" fill="#333333">To Kill a Mockingbird</text>
  <text x="180" y="385" font-family="Arial, sans-serif" font-size="12" fill="#999999">ISBN: 978-0-06-112008-4</text>
  <text x="480" y="373" font-family="Arial, sans-serif" font-size="14" fill="#333333">Harper Lee</text>
  <text x="680" y="373" font-family="Arial, sans-serif" font-size="14" fill="#333333">Fiction</text>
  <text x="880" y="373" font-family="Arial, sans-serif" font-size="14" fill="#333333">1960</text>
  <rect x="1020" y="350" width="60" height="25" fill="#2196F3" stroke="none" rx="3"/>
  <text x="1035" y="367" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Edit</text>
  <rect x="1090" y="350" width="60" height="25" fill="#F44336" stroke="none" rx="3"/>
  <text x="1100" y="367" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Delete</text>

  <!-- Book Row 3 -->
  <rect x="40" y="400" width="1120" height="80" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="415" width="50" height="50" fill="#CCCCCC" stroke="#999999" stroke-width="1" rx="2"/>
  <text x="180" y="445" font-family="Arial, sans-serif" font-size="14" fill="#333333">1984</text>
  <text x="180" y="465" font-family="Arial, sans-serif" font-size="12" fill="#999999">ISBN: 978-0-452-28423-4</text>
  <text x="480" y="453" font-family="Arial, sans-serif" font-size="14" fill="#333333">George Orwell</text>
  <text x="680" y="453" font-family="Arial, sans-serif" font-size="14" fill="#333333">Dystopian</text>
  <text x="880" y="453" font-family="Arial, sans-serif" font-size="14" fill="#333333">1949</text>
  <rect x="1020" y="430" width="60" height="25" fill="#2196F3" stroke="none" rx="3"/>
  <text x="1035" y="447" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Edit</text>
  <rect x="1090" y="430" width="60" height="25" fill="#F44336" stroke="none" rx="3"/>
  <text x="1100" y="447" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Delete</text>

  <!-- Book Row 4 -->
  <rect x="40" y="480" width="1120" height="80" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="495" width="50" height="50" fill="#CCCCCC" stroke="#999999" stroke-width="1" rx="2"/>
  <text x="180" y="525" font-family="Arial, sans-serif" font-size="14" fill="#333333">Pride and Prejudice</text>
  <text x="180" y="545" font-family="Arial, sans-serif" font-size="12" fill="#999999">ISBN: 978-0-14-143951-8</text>
  <text x="480" y="533" font-family="Arial, sans-serif" font-size="14" fill="#333333">Jane Austen</text>
  <text x="680" y="533" font-family="Arial, sans-serif" font-size="14" fill="#333333">Romance</text>
  <text x="880" y="533" font-family="Arial, sans-serif" font-size="14" fill="#333333">1813</text>
  <rect x="1020" y="510" width="60" height="25" fill="#2196F3" stroke="none" rx="3"/>
  <text x="1035" y="527" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Edit</text>
  <rect x="1090" y="510" width="60" height="25" fill="#F44336" stroke="none" rx="3"/>
  <text x="1100" y="527" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Delete</text>

  <!-- Pagination -->
  <rect x="40" y="590" width="1120" height="40" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="60" y="615" font-family="Arial, sans-serif" font-size="13" fill="#666666">Showing 1-4 of 24 books</text>
  <rect x="1010" y="600" width="30" height="20" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1" rx="2"/>
  <text x="1020" y="614" font-family="Arial, sans-serif" font-size="12" fill="#333333">◀</text>
  <rect x="1050" y="600" width="30" height="20" fill="#2196F3" stroke="none" rx="2"/>
  <text x="1062" y="614" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">1</text>
  <rect x="1090" y="600" width="30" height="20" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1" rx="2"/>
  <text x="1102" y="614" font-family="Arial, sans-serif" font-size="12" fill="#333333">2</text>
  <rect x="1130" y="600" width="30" height="20" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1" rx="2"/>
  <text x="1140" y="614" font-family="Arial, sans-serif" font-size="12" fill="#333333">▶</text>

  <!-- Footer -->
  <rect x="0" y="760" width="1200" height="40" fill="#333333" stroke="none"/>
  <text x="40" y="785" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">© 2024 Books Online. All rights reserved.</text>
</svg>