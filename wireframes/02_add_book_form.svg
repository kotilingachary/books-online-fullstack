<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#F5F5F5"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">Books Online</text>

  <!-- Back Button -->
  <rect x="1040" y="25" width="120" height="30" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="1070" y="47" font-family="Arial, sans-serif" font-size="14" fill="#333333">← Back</text>

  <!-- Main Form Container -->
  <rect x="250" y="130" width="700" height="700" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" rx="8"/>

  <!-- Form Title -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#333333" text-anchor="middle">Add New Book</text>
  <line x1="300" y1="200" x2="900" y2="200" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Book Cover Upload -->
  <text x="300" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Book Cover</text>
  <rect x="300" y="250" width="200" height="250" fill="#F9F9F9" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="5,5" rx="4"/>
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="14" fill="#999999" text-anchor="middle">Click to upload</text>
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="12" fill="#BBBBBB" text-anchor="middle">or drag and drop</text>
  <circle cx="400" cy="340" r="20" fill="none" stroke="#CCCCCC" stroke-width="2"/>
  <line x1="400" y1="330" x2="400" y2="350" stroke="#CCCCCC" stroke-width="2"/>
  <line x1="390" y1="340" x2="410" y2="340" stroke="#CCCCCC" stroke-width="2"/>

  <!-- Form Fields -->
  <!-- Title -->
  <text x="550" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Title *</text>
  <rect x="550" y="280" width="330" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="565" y="303" font-family="Arial, sans-serif" font-size="13" fill="#999999">Enter book title</text>

  <!-- ISBN -->
  <text x="550" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">ISBN *</text>
  <rect x="550" y="350" width="330" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="565" y="373" font-family="Arial, sans-serif" font-size="13" fill="#999999">978-0-00-000000-0</text>

  <!-- Author -->
  <text x="550" y="410" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Author *</text>
  <rect x="550" y="420" width="330" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="565" y="443" font-family="Arial, sans-serif" font-size="13" fill="#999999">Enter author name</text>

  <!-- Publisher -->
  <text x="550" y="480" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Publisher</text>
  <rect x="550" y="490" width="330" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="565" y="513" font-family="Arial, sans-serif" font-size="13" fill="#999999">Enter publisher name</text>

  <!-- Genre -->
  <text x="300" y="530" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Genre *</text>
  <rect x="300" y="540" width="160" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="315" y="563" font-family="Arial, sans-serif" font-size="13" fill="#999999">Select genre</text>
  <text x="445" y="563" font-family="Arial, sans-serif" font-size="13" fill="#999999">▼</text>

  <!-- Year -->
  <text x="480" y="530" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Publication Year *</text>
  <rect x="480" y="540" width="160" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="495" y="563" font-family="Arial, sans-serif" font-size="13" fill="#999999">YYYY</text>

  <!-- Pages -->
  <text x="660" y="530" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Pages</text>
  <rect x="660" y="540" width="220" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="675" y="563" font-family="Arial, sans-serif" font-size="13" fill="#999999">Number of pages</text>

  <!-- Language -->
  <text x="300" y="600" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Language *</text>
  <rect x="300" y="610" width="160" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="315" y="633" font-family="Arial, sans-serif" font-size="13" fill="#999999">Select language</text>
  <text x="445" y="633" font-family="Arial, sans-serif" font-size="13" fill="#999999">▼</text>

  <!-- Price -->
  <text x="480" y="600" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Price</text>
  <rect x="480" y="610" width="160" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="495" y="633" font-family="Arial, sans-serif" font-size="13" fill="#999999">$0.00</text>

  <!-- Stock Quantity -->
  <text x="660" y="600" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Stock Quantity</text>
  <rect x="660" y="610" width="220" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="675" y="633" font-family="Arial, sans-serif" font-size="13" fill="#999999">Available copies</text>

  <!-- Description -->
  <text x="300" y="675" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Description</text>
  <rect x="300" y="685" width="580" height="80" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="315" y="708" font-family="Arial, sans-serif" font-size="13" fill="#999999">Enter book description...</text>

  <!-- Required Field Note -->
  <text x="300" y="790" font-family="Arial, sans-serif" font-size="12" fill="#999999">* Required fields</text>

  <!-- Action Buttons -->
  <rect x="550" y="780" width="160" height="35" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="630" y="803" font-family="Arial, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Cancel</text>

  <rect x="720" y="780" width="160" height="35" fill="#4CAF50" stroke="none" rx="4"/>
  <text x="800" y="803" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Add Book</text>

  <!-- Footer -->
  <rect x="0" y="860" width="1200" height="40" fill="#333333" stroke="none"/>
  <text x="40" y="885" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">© 2024 Books Online. All rights reserved.</text>
</svg>