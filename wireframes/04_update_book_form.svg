<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#F5F5F5"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333333">Books Online</text>

  <!-- Back Button -->
  <rect x="1040" y="25" width="120" height="30" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="1070" y="47" font-family="Arial, sans-serif" font-size="14" fill="#333333">← Back</text>

  <!-- Main Form Container -->
  <rect x="250" y="130" width="700" height="700" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" rx="8"/>

  <!-- Form Title -->
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#333333" text-anchor="middle">Edit Book</text>
  <line x1="300" y1="200" x2="900" y2="200" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Book ID Display -->
  <rect x="300" y="210" width="580" height="30" fill="#FFF9E6" stroke="#FFD54F" stroke-width="1" rx="4"/>
  <text x="315" y="230" font-family="Arial, sans-serif" font-size="12" fill="#F57C00">Book ID: BK-2024-001234 | Last Updated: 2024-01-15</text>

  <!-- Book Cover Upload with Existing Image -->
  <text x="300" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Book Cover</text>
  <rect x="300" y="275" width="200" height="250" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="2" rx="4"/>
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">[Cover Image]</text>
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">gatsby_cover.jpg</text>
  <rect x="320" y="500" width="160" height="20" fill="#2196F3" stroke="none" rx="3"/>
  <text x="400" y="515" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">Change Image</text>

  <!-- Form Fields with Pre-filled Data -->
  <!-- Title -->
  <text x="550" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Title *</text>
  <rect x="550" y="300" width="330" height="35" fill="#FFFFFF" stroke="#2196F3" stroke-width="1" rx="4"/>
  <text x="565" y="323" font-family="Arial, sans-serif" font-size="13" fill="#333333">The Great Gatsby</text>

  <!-- ISBN -->
  <text x="550" y="360" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">ISBN *</text>
  <rect x="550" y="370" width="330" height="35" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="565" y="393" font-family="Arial, sans-serif" font-size="13" fill="#999999">978-0-7432-7356-5</text>
  <text x="865" y="393" font-family="Arial, sans-serif" font-size="10" fill="#999999">🔒</text>

  <!-- Author -->
  <text x="550" y="430" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Author *</text>
  <rect x="550" y="440" width="330" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="565" y="463" font-family="Arial, sans-serif" font-size="13" fill="#333333">F. Scott Fitzgerald</text>

  <!-- Publisher -->
  <text x="550" y="500" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Publisher</text>
  <rect x="550" y="510" width="330" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="565" y="533" font-family="Arial, sans-serif" font-size="13" fill="#333333">Scribner</text>

  <!-- Genre -->
  <text x="300" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Genre *</text>
  <rect x="300" y="565" width="160" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="315" y="588" font-family="Arial, sans-serif" font-size="13" fill="#333333">Fiction</text>
  <text x="445" y="588" font-family="Arial, sans-serif" font-size="13" fill="#999999">▼</text>

  <!-- Year -->
  <text x="480" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Publication Year *</text>
  <rect x="480" y="565" width="160" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="495" y="588" font-family="Arial, sans-serif" font-size="13" fill="#333333">1925</text>

  <!-- Pages -->
  <text x="660" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Pages</text>
  <rect x="660" y="565" width="220" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="675" y="588" font-family="Arial, sans-serif" font-size="13" fill="#333333">180</text>

  <!-- Language -->
  <text x="300" y="625" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Language *</text>
  <rect x="300" y="635" width="160" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="315" y="658" font-family="Arial, sans-serif" font-size="13" fill="#333333">English</text>
  <text x="445" y="658" font-family="Arial, sans-serif" font-size="13" fill="#999999">▼</text>

  <!-- Price -->
  <text x="480" y="625" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Price</text>
  <rect x="480" y="635" width="160" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="495" y="658" font-family="Arial, sans-serif" font-size="13" fill="#333333">$15.99</text>

  <!-- Stock Quantity -->
  <text x="660" y="625" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Stock Quantity</text>
  <rect x="660" y="635" width="220" height="35" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="675" y="658" font-family="Arial, sans-serif" font-size="13" fill="#333333">42</text>

  <!-- Description -->
  <text x="300" y="700" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555555">Description</text>
  <rect x="300" y="710" width="580" height="80" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="315" y="733" font-family="Arial, sans-serif" font-size="12" fill="#333333">A classic American novel set in the Jazz Age that tells the</text>
  <text x="315" y="748" font-family="Arial, sans-serif" font-size="12" fill="#333333">story of Jay Gatsby's pursuit of wealth and lost love...</text>

  <!-- Required Field Note -->
  <text x="300" y="805" font-family="Arial, sans-serif" font-size="12" fill="#999999">* Required fields | 🔒 = Read-only field</text>

  <!-- Action Buttons -->
  <rect x="550" y="790" width="160" height="35" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="1" rx="4"/>
  <text x="630" y="813" font-family="Arial, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Cancel</text>

  <rect x="720" y="790" width="160" height="35" fill="#FF9800" stroke="none" rx="4"/>
  <text x="800" y="813" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Update Book</text>

  <!-- Footer -->
  <rect x="0" y="860" width="1200" height="40" fill="#333333" stroke="none"/>
  <text x="40" y="885" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">© 2024 Books Online. All rights reserved.</text>
</svg>